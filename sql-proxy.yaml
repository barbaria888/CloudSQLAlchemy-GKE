# ==============================================================================
# Kubernetes Deployment & Service Manifest for WordPress
# Integrates GKE with Google Cloud SQL using the Cloud SQL Proxy Sidecar
# authenticated via GKE Workload Identity.
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  labels:
    app: wordpress
spec:
  replicas: 1 # Default replica count for WordPress instance
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      # ------------------------------------------------------------------------
      # Kubernetes Service Account (KSA) configured with Workload Identity.
      # This KSA is annotated to masquerade as the Google Service Account (GSA)
      # with the 'Cloud SQL Client' role.
      # ------------------------------------------------------------------------
      serviceAccountName: gkesqlsa
      
      containers:
        # ======================================================================
        # 1. Main Web Container: WordPress
        # ======================================================================
        - name: web
          image: gcr.io/cloud-marketplace/google/wordpress:6.1
          ports:
            - containerPort: 80
              name: http
          env:
            # Connects to MySQL on localhost (127.0.0.1) because the sidecar
            # proxy shares the same network namespace (and loopback interface)
            # as this container inside the Pod.
            - name: WORDPRESS_DB_HOST
              value: 127.0.0.1:3306

            # Retrieve database credentials securely from Kubernetes Secrets
            # [START cloudsql_secrets]
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: username
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-credentials
                  key: password
            # [END cloudsql_secrets]

        # ======================================================================
        # 2. Sidecar Container: Cloud SQL Auth Proxy
        # ======================================================================
        # The proxy handles encryption, authentication, and secure routing
        # to the Cloud SQL Instance without exposing the instance directly
        # to the public internet or hardcoding TLS credentials.
        # ======================================================================
        # [START proxy_container]
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
          args: 
            # Output logs in JSON format for easy parsing and structured logging
            - "--structured-logs"
            # Specify the port to listen on for local database connections
            - "--port=3306"
            # Cloud SQL Instance Connection Name in the format:
            # <PROJECT_ID>:<REGION>:<INSTANCE_NAME>
            # During deployment, replace this placeholder or use the sed tool:
            # sed -i 's/<INSTANCE_CONNECTION_NAME>/'"${SQL_NAME}"'/g' sql-proxy.yaml
            - "<INSTANCE_CONNECTION_NAME>" 
          securityContext:
            # Secure execution context: running as a non-root user (good practice)
            runAsNonRoot: true 
        # [END proxy_container]

---
# ==============================================================================
# Kubernetes Service definition to expose the WordPress container
# ==============================================================================
apiVersion: "v1"
kind: "Service"
metadata:
  name: "wordpress-service"
  namespace: "default"
  labels:
    app: "wordpress"
spec:
  ports:
    - protocol: "TCP"
      port: 80
      targetPort: 80
  selector:
    app: "wordpress"
  # Exposed externally via a Cloud Load Balancer (public facing IP)
  type: "LoadBalancer"
  loadBalancerIP: ""
